name: Deploy

on:
  workflow_run:
    workflows: ["Build and Push Docker"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Папка проекта на сервере
            APP_DIR="/bls"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "🚀 Загружаем docker-compose.yml с GitHub"
            curl -L -o docker-compose.yml \
            https://raw.githubusercontent.com/artemkill0/BLS-Mood-Friends-backend/main/docker-compose.yml

            # Создаём .env
            cat > .env <<EOF
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            MYSQL_PASSWORD=${MYSQL_PASSWORD}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            EOF
            chmod 600 .env
            echo "✅ .env создан"

            # Останавливаем старые контейнеры
            docker compose down --remove-orphans

            # Подтягиваем свежие образы и запускаем контейнеры
            docker compose pull
            docker compose up -d --force-recreate
            echo "✅ Контейнеры обновлены"

            # Последние 20 строк логов Flask
            docker logs flask_app --tail 20 || true

            # Чистка старых образов
            docker image prune -af --filter "label=bls-backend"
            echo "✅ Старые образы очищены"

            # Удаляем .env для безопасности
            rm -f .env
            echo "🔒 .env удалён"