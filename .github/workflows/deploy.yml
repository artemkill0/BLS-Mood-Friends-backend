name: Deploy BLS Backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "📁 Очистка..."
          rm -rf /bls/*
          
          echo "🐙 Клонируем..."
          cd /bls
          git clone https://artemkill0:$DEPLOY_TOKEN@github.com/artemkill0/BLS-Mood-Friends-backend.git .
          
          echo "📋 Файлы:"
          ls -la
          
          echo "🐳 Docker..."
          cd /bls
          if [ -f "docker-compose.yml" ]; then
            docker compose up -d --build
            docker compose ps
          else
            echo "❌ НЕТ docker-compose.yml!"
            exit 1
          fi
