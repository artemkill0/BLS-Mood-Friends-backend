name: Deploy

on:
  workflow_run:
    workflows: ["Build and Push Docker"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            APP_DIR="/bls"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "🚀 Загружаем docker-compose.yml с GitHub"
            curl -L -o docker-compose.yml \
            https://raw.githubusercontent.com/artemkill0/BLS-Mood-Friends-backend/main/docker-compose.yml

            echo "✅ Файл docker-compose.yml загружен"

            # Передаём переменные напрямую в команду docker compose
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} \
            MYSQL_PASSWORD=${MYSQL_PASSWORD} \
            REDIS_PASSWORD=${REDIS_PASSWORD} \
            docker compose down --remove-orphans

            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} \
            MYSQL_PASSWORD=${MYSQL_PASSWORD} \
            REDIS_PASSWORD=${REDIS_PASSWORD} \
            docker compose pull

            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} \
            MYSQL_PASSWORD=${MYSQL_PASSWORD} \
            REDIS_PASSWORD=${REDIS_PASSWORD} \
            docker compose up -d --force-recreate

            echo "✅ Контейнеры обновлены"

            docker logs flask_app --tail 20 || true

            echo "✅ Деплой завершён"