name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /bls || mkdir -p /bls && cd /bls
          rm -rf .git
          git init
          git remote add origin https://artemkill0:${{ secrets.DEPLOY_TOKEN }}@github.com/artemkill0/BLS-Mood-Friends-backend.git
          git fetch origin
          git checkout main
          git pull origin main
          
          # 🔒 Передаем Secrets в docker-compose
          export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
          export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          
          echo "=== ФАЙЛЫ ==="
          ls -la
          
          if [ -f "docker-compose.yml" ]; then
            docker compose down || true
            docker compose up -d --build
            docker compose ps
            echo "✅ Деплой завершен!"
          else
            echo "❌ docker-compose.yml ОТСУТСТВУЕТ"
            exit 1
          fi
