name: Deploy BLS Backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "📁 Очистка /bls..."
          rm -rf /bls/* /bls/.[!.]*  # Удаляем все включая скрытые
          
          echo "🐙 Клонируем через SSH (Deploy Key)..."
          cd /bls
          git clone git@github.com:artemkill0/BLS-Mood-Friends-backend.git .
          
          echo "📋 Проверяем файлы..."
          ls -la /bls
          
          echo "🐳 Docker Compose..."
          if [ -f "docker-compose.yml" ]; then
            docker compose up -d --build
            docker compose ps
          else
            echo "❌ docker-compose.yml НЕ НАЙДЕН!"
            exit 1
          fi
