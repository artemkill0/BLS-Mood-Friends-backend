name: Deploy BLS Backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🔍 Поиск docker-compose.yml..."
          cd /root && find . -name "docker-compose.yml" -type f 2>/dev/null || echo "Не найдено"
          
          echo "📁 Переходим в /bls..."
          mkdir -p /bls && cd /bls
          
          echo "🐙 Git операции..."
          git rev-parse --git-dir 2>/dev/null || git clone https://github.com/artemkill0/BLS-Mood-Friends-backend.git .
          git checkout main
          git pull origin main
          
          echo "🐳 Docker Compose..."
          docker compose version
          docker compose pull || true
          docker compose up -d --build --remove-orphans || docker compose up -d
          
          echo "✅ Статус контейнеров:"
          docker compose ps
          docker image prune -f
